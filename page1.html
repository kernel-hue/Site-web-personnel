<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Obsèques - Page 1</title>
    <style>
        @page {
            size: A5;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #000000;
            background-color: #FFFFFF;
            box-sizing: border-box;
            width: 148mm;
            height: 210mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
        }
        .header {
            margin-top: 15px;
        }
        .titre-programme {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: normal;
        }
        .separation-ligne {
            width: 40px;
            height: 1px;
            background-color: #000000;
            margin: 10px auto;
        }
        .nom {
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 5px 0;
            line-height: 1.3;
        }
        .dates {
            font-size: 16px;
            font-style: italic;
            margin-bottom: 15px;
        }
        .conteneur-photo {
            width: 95mm;
            height: 110mm;
            border: 1px solid #000000;
            padding: 4px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #FAFAFA;
        }
        .conteneur-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .boite-photo-vide {
            font-size: 11px;
            color: #555;
            font-style: italic;
        }
        .verset-biblique {
            font-size: 12px;
            line-height: 1.5;
            font-style: italic;
            max-width: 120mm;
            margin-bottom: 20px;
            padding: 0 10px;
        }
        .reference {
            display: block;
            font-weight: bold;
            font-style: normal;
            margin-top: 5px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #photo{
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="titre-programme">En Mémoire de</h1>
        <div class="separation-ligne"></div>
        <div class="nom">NOUNGA PEKNYEMB<br>Siméon</div>
        <div class="dates">1942 – 2026</div>
    </div>

    <div class="conteneur-photo">
        <img src="IMG-20260504-WA0014.jpg" alt="NOUNGA PEKNYEMB Siméon" id="photo">
    </div>

    <div class="verset-biblique">
        "Oui, le bonheur et la grâce m'accompagneront tous les jours de ma vie, et j'habiterai dans la maison de l'Éternel jusqu'à la fin de mes jours."
        <span class="reference">Psaume 23:6</span>
    </div>

</body>
</html>
